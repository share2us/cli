name: release

# Build the CLI for every supported platform on each push to main (Go changes
# only) and publish a GitHub Release. install.sh downloads these assets.
on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true

      - name: Build all platforms
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y%m%d%H%M%S)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          mkdir -p dist
          export CGO_ENABLED=0
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"; arch="${platform#*/}"
            echo "==> building $os/$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X github.com/share2us/cli-core.BuildVersion=$VERSION" \
              -o dist/share2us .
            tar -C dist -czf "dist/share2us_${os}_${arch}.tar.gz" share2us
            rm -f dist/share2us
            ( cd dist && cksum "share2us_${os}_${arch}.tar.gz" > "share2us_${os}_${arch}.tar.gz.crc32" )
          done
          ls -la dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" dist/*.tar.gz dist/*.crc32 \
            --title "Share2Us CLI ${VERSION}" \
            --notes "Automated build from ${GITHUB_SHA}. Install: \`curl -fsSL https://share2.us/install.sh | sh\`" \
            --latest

      # Publish the npm wrapper (@share2us/cli), pinned to this exact release so a
      # given npm version always installs the same binary.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish @share2us/cli to npm
        if: env.NPM_TOKEN != ''
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm pkg set "share2usCliVersion=v${VERSION}"
          npm version "0.1.${GITHUB_RUN_NUMBER}" --no-git-tag-version --allow-same-version
          npm publish --access public
